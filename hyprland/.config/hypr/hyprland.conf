# Ref: https://wiki.hypr.land/Configuring/
$left   = DP-1
$center = HDMI-A-1
$right  = DP-2

monitorv2 {
  output = $left
  mode = 1920x1080@120
  position = auto-left
  transform = 1 # 270
}
monitorv2 {
  output = $center
  mode = 3840x2160@120
  position = 0x0
}
monitorv2 {
  output = $right
  mode = 1920x1080@120
  position = auto-right
  transform = 3 # 90
}

# autostart
exec-once = alacritty
# https://github.com/ndom91/rose-pine-hyprcursor
exec-once = hyprctl setcursor rose-pine-hyprcursor 42 # bigger cursor for big monitor
exec-once = [workspace 2 silent] waybar -c ~/.config/waybar/config-left.jsonc
exec-once = [workspace 2 silent] firefox
exec-once = [workspace 3 silent] steam -silent
exec-once = [workspace 4 silent] discord
exec-once = [workspace 4 silent] Telegram
exec-once = [workspace 5 silent] obsidian
exec-once = [workspace special:magic silent] keepassxc

# TODO: https://www.reddit.com/r/hyprland/comments/1bvbyz8/hyprland_instance_signature_not_updating_on
exec-once = tmux setenv -g HYPRLAND_INSTANCE_SIGNATURE "$HYPRLAND_INSTANCE_SIGNATURE"
exec-once = thunar --daemon
exec-once = vicinae server

# TODO: review this stuff
# XDG Desktop Portal
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
# QT
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
# GDK
env = GDK_SCALE,1
# Toolkit Backend
env = GDK_BACKEND,wayland,x11,*
env = CLUTTER_BACKEND,wayland
# Mozilla
env = MOZ_ENABLE_WAYLAND,1
# NVIDIA https://wiki.hyprland.org/Nvidia/
env = GBM_BACKEND,nvidia-drm
env = LIBVA_DRIVER_NAME,nvidia
env = SDL_VIDEODRIVER,wayland
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = __NV_PRIME_RENDER_OFFLOAD,1
env = __VK_LAYER_NV_optimus,NVIDIA_only
# FOR VM and POSSIBLY NVIDIA
env = WLR_NO_HARDWARE_CURSORS,1 # On hyprland >v0.41, now configured on variable cursor section
env = WLR_RENDERER_ALLOW_SOFTWARE,1
# nvidia firefox (for hardware acceleration on FF)?
# check this post https://github.com/elFarto/nvidia-vaapi-driver#configuration
env = MOZ_DISABLE_RDD_SANDBOX,1
env = EGL_PLATFORM,wayland
# Obsidian
env = OBSIDIAN_USE_WAYLAND, 1

general {
    gaps_in = 2
    gaps_out = 16 # burnin-protection / pixel shifting on LG TV
    border_size = 0
}

decoration {
    blur {
        enabled = false
    }
}

animations {
  enabled = false
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    force_default_wallpaper = 0 # weebs out
    disable_hyprland_logo = true
    disable_splash_rendering = false
    vrr = false
}

ecosystem {
    no_update_news = true
    no_donation_nag = true
}

input {
    kb_layout = us,ua
    kb_options =  grp:alt_shift_toggle
    repeat_delay = 200
    repeat_rate = 150
}

cursor {
    no_hardware_cursors = true
}

bind = SUPER, return, exec, alacritty
bind = SUPER, Q, killactive,
bind = SUPER, M, exit,
bind = SUPER, E, exec, thunar
bind = CONTROL, SPACE, exec, vicinae toggle

bind = SUPER, F, fullscreen, 0
bind = SUPER, T, togglefloating
bind = SUPER, Z, exec, hyprctl dispatch pin

bind = SUPER, Tab, movefocus, l
bind = SUPER_SHIFT, Tab, movefocus, r
# bind = SUPER, J, movefocus, l
# bind = SUPER, K, movefocus, r
bind = SUPER_SHIFT, J, resizeactive, -70 0 # Super + Shift + Left = resize active window left
bind = SUPER_SHIFT, K, resizeactive, 70 0 # Super + Shift + Right = resize active window right

bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5

bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5

bind = SUPER, W, togglespecialworkspace, magic
bind = SUPER SHIFT, W, movetoworkspace, special:magic

bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

bind=, mouse_left, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 10%+
bind=, mouse_right, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 10%-

# deps: wl-clipboard, grimblast (AUR)
bind = SUPER SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy && wl-paste > ~/Screenshots/Screenshot-$(date +%F_%T).png
bind = SUPER, S, exec, grim - | wl-copy && wl-paste > ~/Screenshots/Screenshot-$(date +%F_%T).png

# TODO: think about karabiner compat
bind = CONTROL ALT SHIFT, b, exec, hyprctl dispatch focuswindow "class:firefox"

bind = SUPER CONTROL, Q, exec, hyprctl dispatch dpms off && bscpylgtvcommand 192.168.0.32 turn_screen_off
bind = SUPER SHIFT, Q, exec, hyprctl dispatch dpms on && bscpylgtvcommand 192.168.0.32 turn_screen_on

# Ignore maximize requests from apps. You'll probably like this.
windowrule = suppress_event maximize, match:class (.*)
# what goes where
windowrule = workspace 1, match:class Alacritty
windowrule = workspace 2 silent, match:class firefox
windowrule = workspace 4 silent, match:class org.telegram.desktop
windowrule = workspace 4 silent, match:class discord
windowrule = workspace special:magic silent, match:class org.keepassxc.KeePassXC
windowrule = workspace special:magic silent, match:class obsidian
# Pavucontrol floating
windowrule = float on, match:class (.*org.pulseaudio.pavucontrol.*)
windowrule = center on,match:class (.*org.pulseaudio.pavucontrol.*)
windowrule = pin on,match:class (.*org.pulseaudio.pavucontrol.*)
# PiP youtube
windowrule = float on, match:title (^Picture-in-Picture$)
windowrule = pin on, match:title (^Picture-in-Picture$)
windowrule = size 1280 800, match:title (^Picture-in-Picture$)
# PoE
windowrule = workspace 5 fullscreen on, match:initial_class pathofexile.exe

# workspace-to-monitor
workspace = 1, monitor:$center, default:true
workspace = 2, monitor:$center
workspace = 3, monitor:$center
workspace = 4, monitor:$left, bordersize:2, gapsin:2, gapsout:0
workspace = 5, monitor:$right, bordersize:2, gapsin:2, gapsout:0
